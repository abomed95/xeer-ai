<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Xeer AI Premium</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#06111f;
    color:white;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:40px;
}

.hero {
    text-align:center;
    padding:80px 20px;
}

.hero h1 {
    font-size:48px;
}

.hero span {
    color:#d4af37;
}

.btn {
    padding:14px 24px;
    background:#d4af37;
    color:black;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.features {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:20px;
    margin-top:50px;
}

.card {
    background:#0f1f38;
    padding:20px;
    border-radius:15px;
}

.footer {
    text-align:center;
    margin-top:60px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
    <h1>Xeer AI <span>Premium</span></h1>
    <p>Understand Somali Customary Law with AI</p>
    <button class="btn" onclick="window.location.href='http://localhost:8501'">
        Try Now
    </button>
</div>

<div class="features">
    <div class="card">🔍 Smart Search in Xeer</div>
    <div class="card">🧠 Conversation Memory</div>
    <div class="card">📚 Verified Sources</div>
    <div class="card">🌍 Multi-language</div>
</div>

<div class="footer">
    Xeer AI · Built with AI & Tradition
</div>

</div>

</body>
</html>
